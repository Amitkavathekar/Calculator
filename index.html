<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section>
      <div class="container">
        <div class="inputcontainer">
          <input id="display" type="text" />
        </div>
        <div class="rows">
          <div class="numberblock" style="background-color: red">c</div>
          <div class="numberblock" style="background-color: rgb(235, 160, 22)">/</div>
          <div class="numberblock" style="background-color: rgb(235, 160, 22)">*</div>
          <div class="numberblock" style="background-color: rgb(235, 160, 22)">-</div>
        </div>
        <div class="rows">
          <div class="numberblock" style="background-color: skyblue">7</div>
          <div class="numberblock"  style="background-color: skyblue">8</div>
          <div class="numberblock"  style="background-color: skyblue">9</div>
          <div class="numberblock" style="background-color: rgb(235, 160, 22)">+</div>
        </div>
        <div class="rows">
          <div class="numberblock"  style="background-color: skyblue">4</div>
          <div class="numberblock"  style="background-color: skyblue">5</div>
          <div class="numberblock" style="background-color: skyblue">6</div>
          <div class="numberblock" style="background-color: rgb(78, 233, 17)">=</div>
        </div>
        <div class="rows">
          <div class="numberblock" style="background-color: skyblue">1</div>
          <div class="numberblock" style="background-color: skyblue">2</div>
          <div class="numberblock" style="background-color: skyblue">3</div>
          <div class="numberblock" style="background-color: skyblue">0</div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
